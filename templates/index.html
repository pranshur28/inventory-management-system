{% extends "base.html" %}

{% block content %}
<h2>Inventory List</h2>
<div class="table-responsive">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for product in products %}
            <tr>
                <td>{{ product.id }}</td>
                <td>{{ product.name }}</td>
                <td>{{ product.quantity }}</td>
                <td>${{ "%.2f"|format(product.price) }}</td>
                <td>
                    <a href="{{ url_for('edit_product', id=product.id) }}" class="btn btn-primary btn-sm">Edit</a>
                    <a href="{{ url_for('delete_product', id=product.id) }}" class="btn btn-danger btn-sm" 
                       onclick="return confirm('Are you sure you want to delete this product?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<a href="{{ url_for('add_product') }}" class="btn btn-success">Add New Product</a>
{% endblock %}
